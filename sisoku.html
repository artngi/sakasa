<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>たのしい！しそくえんざんゲーム</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'M PLUS Rounded 1c', sans-serif; /* 全体に丸いフォントを適用 */
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%); /* 明るいグラデーション背景 */
            color: #4a4a4a;
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 30px; /* 角を大きく丸く */
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); /* 柔らかい影 */
            border: 5px solid #fff;
        }
        h1 {
            color: #ff6b6b;
            font-size: 32px;
            margin-bottom: 25px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .setting-group {
            margin-bottom: 18px;
            text-align: left;
            background: #fff9e6; /* 薄い黄色 */
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #ffeaa7;
        }
        .setting-group label strong {
            color: #e67e22; /* オレンジ */
            font-size: 1.1em;
        }
        input[type="number"] {
            width: 70px;
            padding: 8px;
            margin: 0 5px;
            border-radius: 10px;
            border: 2px solid #ddd;
            font-size: 16px;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            text-align: center;
        }
        input[type="checkbox"] {
            transform: scale(1.5); /* チェックボックスを大きく */
            margin-right: 10px;
            vertical-align: middle;
        }
        select, button {
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 15px;
            border: 2px solid #ccc;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            cursor: pointer;
        }
        select {
            background-color: white;
            color: #4a4a4a;
        }
        button {
            background-color: #4cd137; /* 明るい緑 */
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 18px;
            transition: 0.2s, transform 0.1s;
            box-shadow: 0 5px 0 #44bd32; /* 立体的なボタン */
            margin-top: 10px;
        }
        button:hover {
            background-color: #44bd32;
            transform: translateY(2px);
            box-shadow: 0 3px 0 #44bd32;
        }
        button:active {
            transform: translateY(5px);
            box-shadow: 0 0 0 #44bd32;
        }
        .btn-giveup {
            background-color: #ff6b6b; /* 赤 */
            box-shadow: 0 5px 0 #ee5253;
        }
        .btn-giveup:hover {
            background-color: #ee5253;
            box-shadow: 0 3px 0 #ee5253;
        }
        .btn-giveup:active {
            box-shadow: 0 0 0 #ee5253;
        }
        
        /* ゲーム画面用 */
        #game-screen { display: none; }
        .roulette-area {
            font-size: 50px; /* 数字を大きく */
            font-weight: bold;
            margin: 25px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            background: #e1f5fe; /* 薄い水色 */
            padding: 25px;
            border-radius: 20px;
            border: 3px solid #b3e5fc;
            box-shadow: inset 0 3px 10px rgba(0,0,0,0.05);
        }
        .timer-score {
            display: flex;
            justify-content: space-between;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #333;
        }
        .time-limit {
            color: #ff6b6b;
            background: #fff;
            padding: 5px 15px;
            border-radius: 20px;
            border: 2px solid #ff6b6b;
        }
        #message {
            font-size: 20px;
            font-weight: bold;
            margin: 20px 0;
            height: 30px;
            transition: 0.3s;
        }
        .correct { color: #4cd137; animation: bounce 0.5s; } /* 正解時のアニメーション */
        .wrong { color: #ff6b6b; animation: shake 0.3s; } /* 不正解時のアニメーション */
        
        #input-area input[type="number"] {
            font-size: 32px;
            padding: 15px;
            width: 180px;
            border: 3px solid #4cd137;
            border-radius: 20px;
        }

        /* アニメーションの定義 */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>たのしい！しそくえんざんゲーム</h1>
    
    <div id="home-screen">
        <div class="timer-score">
            <span>今のポイント: <span id="total-score" style="color: #4cd137; font-size: 1.2em;">0</span> pts</span>
        </div>
        
        <div class="setting-group">
            <label><strong>難易度 (制限時間):</strong></label>
            <select id="difficulty">
                <option value="30">やさしい (30秒)</option>
                <option value="20" selected>ふつう (20秒)</option>
                <option value="10">むずかしい (10秒)</option>
            </select>
        </div>

        <div class="setting-group">
            <label><strong>1つ目の数:</strong></label>
            いちばん小さい <input type="number" id="num1-min" value="1"> 〜 
            いちばん大きい <input type="number" id="num1-max" value="9">
        </div>

        <div class="setting-group">
            <label><strong>計算方法:</strong></label>
            <select id="operator">
                <option value="+">＋ (たしざん)</option>
                <option value="-">－ (ひきざん)</option>
                <option value="*">× (かけざん)</option>
                <option value="/">÷ (わりざん)</option>
            </select>
            <br><br>
            <label style="font-size: 0.9em; color: #7f8c8d;">
                <input type="checkbox" id="allow-negative"> 答えがマイナスになってもOK？
            </label>
        </div>

        <div class="setting-group">
            <label><strong>2つ目の数:</strong></label>
            いちばん小さい <input type="number" id="num2-min" value="1"> 〜 
            いちばん大きい <input type="number" id="num2-max" value="9">
        </div>

        <button onclick="startGame()" style="width: 100%; padding: 18px; font-size: 22px; margin-top: 15px;">ゲームスタート！</button>
    </div>

    <div id="game-screen">
        <div class="timer-score">
            <span>ポイント: <span id="game-score">0</span> pts</span>
            <span class="time-limit">のこり: <span id="timer">--</span>秒</span>
        </div>

        <div class="roulette-area">
            <span id="display-num1">?</span>
            <span id="display-operator">?</span>
            <span id="display-num2">?</span>
            <span>=</span>
            <span>?</span>
        </div>

        <div id="input-area" style="display: none;">
            <input type="number" id="answer-input" placeholder="答えを入力" step="any">
            <br><br>
            <button onclick="checkAnswer()">こたえる</button>
            <button class="btn-giveup" onclick="giveUp()">ギブアップ</button>
        </div>

        <div id="message"></div>

        <button id="back-btn" onclick="goHome()" style="display: none; width: 100%; margin-top: 25px; background-color: #3498db; box-shadow: 0 5px 0 #2980b9;">ホームにもどる</button>
    </div>
</div>

<script>
    let totalScore = 0;
    let currentTimer = 0;
    let timerInterval;
    let correctAnswer = 0;
    let isPlaying = false;

    function getRandomInt(min, max) {
        min = Math.ceil(min);
        max = Math.floor(max);
        return Math.floor(Math.random() * (max - min + 1) + min);
    }

    function startGame() {
        const n1Min = parseInt(document.getElementById('num1-min').value);
        const n1Max = parseInt(document.getElementById('num1-max').value);
        const n2Min = parseInt(document.getElementById('num2-min').value);
        const n2Max = parseInt(document.getElementById('num2-max').value);
        const op = document.getElementById('operator').value;
        const diff = parseInt(document.getElementById('difficulty').value);
        const allowNegative = document.getElementById('allow-negative').checked; // チェックボックスの状態

        // 入力チェック
        if (n1Min > n1Max || n2Min > n2Max) {
            alert("「いちばん小さい数」は「いちばん大きい数」より小さくしてね！");
            return;
        }

        // ★追加：マイナスの答えのチェック
        if (op === '-' && !allowNegative) {
            // 1つ目の最大値 < 2つ目の最小値 の場合、確実に負になる
            if (n1Max < n2Min) {
                alert("答えがマイナスにならないように設定してね！\n1つ目の最大値を2つ目の最小値以上にしてください。");
                return; // スタートさせない
            }
        }

        // 画面切り替え
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('input-area').style.display = 'none';
        document.getElementById('back-btn').style.display = 'none';
        document.getElementById('message').innerText = 'ルーレット中...';
        document.getElementById('message').className = '';
        document.getElementById('answer-input').value = '';
        document.getElementById('timer').innerText = diff;
        
        const opDisplay = op === '*' ? '×' : (op === '/' ? '÷' : op);
        document.getElementById('display-operator').innerText = opDisplay;

        // ルーレット演出
        let rouletteCount = 0;
        const rouletteInterval = setInterval(() => {
            document.getElementById('display-num1').innerText = getRandomInt(n1Min, n1Max);
            document.getElementById('display-num2').innerText = getRandomInt(n2Min, n2Max);
            rouletteCount++;

            if (rouletteCount > 30) {
                clearInterval(rouletteInterval);
                const finalNum1 = getRandomInt(n1Min, n1Max);
                const finalNum2 = getRandomInt(n2Min, n2Max);
                
                document.getElementById('display-num1').innerText = finalNum1;
                document.getElementById('display-num2').innerText = finalNum2;
                
                // 正解の計算
                if (op === '+') correctAnswer = finalNum1 + finalNum2;
                if (op === '-') correctAnswer = finalNum1 - finalNum2;
                if (op === '*') correctAnswer = finalNum1 * finalNum2;
                if (op === '/') {
                    let rawAnswer = finalNum1 / finalNum2;
                    correctAnswer = Number.isInteger(rawAnswer) ? rawAnswer : Math.round(rawAnswer * 100) / 100;
                    document.getElementById('message').innerText = Number.isInteger(rawAnswer) ? '' : '※小数のときは、小数点第2位まで（四捨五入）で入力してね';
                } else {
                    document.getElementById('message').innerText = '';
                }

                // ゲーム開始
                currentTimer = diff;
                isPlaying = true;
                document.getElementById('input-area').style.display = 'block';
                document.getElementById('answer-input').focus();
                
                timerInterval = setInterval(() => {
                    currentTimer--;
                    document.getElementById('timer').innerText = currentTimer;
                    if (currentTimer <= 0) {
                        endGame("時間切れ！ポイントは0点...", false);
                    }
                }, 1000);
            }
        }, 50);
    }

    function checkAnswer() {
        if (!isPlaying) return;
        const userAnswer = parseFloat(document.getElementById('answer-input').value);
        
        if (isNaN(userAnswer)) return;

        const msgObj = document.getElementById('message');

        if (userAnswer === correctAnswer) {
            totalScore += currentTimer;
            document.getElementById('game-score').innerText = totalScore;
            document.getElementById('total-score').innerText = totalScore;
            endGame(`正解！ ${currentTimer}ポイントゲット！`, true);
        } else {
            // 優しく、アニメーション付きでフィードバック
            msgObj.innerText = "おしい！もう一度計算してみよう！";
            msgObj.className = "wrong";
            document.getElementById('answer-input').value = '';
            document.getElementById('answer-input').focus();
            // アニメーションを再適用するためにクラスを一瞬外す
            setTimeout(()=> msgObj.className = "wrong", 10);
        }
    }

    function giveUp() {
        if (!isPlaying) return;
        endGame("ギブアップ... ポイントは0点", false);
    }

    function endGame(message, isCorrect) {
        clearInterval(timerInterval);
        isPlaying = false;
        document.getElementById('input-area').style.display = 'none';
        
        const msgObj = document.getElementById('message');
        msgObj.innerText = message;
        msgObj.className = isCorrect ? "correct" : "wrong";
        
        if (!isCorrect) {
            msgObj.innerText += ` (答えは ${correctAnswer} でした)`;
        }

        document.getElementById('back-btn').style.display = 'block';
    }

    function goHome() {
        document.getElementById('game-screen').style.display = 'none';
        document.getElementById('home-screen').style.display = 'block';
    }

    document.getElementById('answer-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            checkAnswer();
        }
    });
</script>

</body>
</html>
